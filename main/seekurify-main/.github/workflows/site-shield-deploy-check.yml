name: SiteShield Deploy Check

on:
  deployment_status:
  workflow_dispatch:
    inputs:
      target_url:
        description: "URL to audit"
        required: false
        type: string
      min_audit_score:
        description: "Minimum passing score"
        required: false
        default: "80"
        type: string

jobs:
  site-shield-audit:
    if: github.event_name == 'workflow_dispatch' || github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    env:
      TARGET_URL: ${{ inputs.target_url || github.event.deployment_status.environment_url || vars.SITE_AUDIT_TARGET_URL }}
      SITE_AUDIT_API_URL: ${{ vars.SITE_AUDIT_API_URL }}
      MIN_AUDIT_SCORE: ${{ inputs.min_audit_score || vars.MIN_AUDIT_SCORE || '80' }}
      SITE_AUDIT_TOKEN: ${{ secrets.SITE_AUDIT_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Validate target URL
        shell: bash
        run: |
          if [ -z "$TARGET_URL" ]; then
            echo "TARGET_URL is not set."
            echo "Set workflow input target_url, deployment_status.environment_url, or repository variable SITE_AUDIT_TARGET_URL."
            exit 1
          fi

      - name: Run SiteShield audit gate
        run: npm run scan:deploy
